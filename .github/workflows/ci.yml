name: Boundary CI

on:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # =============================================================================
  # Lint all code
  # =============================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@13.5.2
        with:
          cli: 1.11.1.1347

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-clojure-${{ hashFiles('**/deps.edn') }}
          restore-keys: ${{ runner.os }}-clojure-
      - name: Clear clj-kondo cache
        run: rm -rf .clj-kondo/.cache/* 2>/dev/null || true

      - name: Lint with clj-kondo
        run: |
          clojure -M:clj-kondo --lint \
            boundary-tools/src \
            libs/core/src \
            libs/observability/src \
            libs/platform/src \
            libs/user/src \
            libs/admin/src \
            libs/storage/src \
            libs/cache/src \
            libs/jobs/src \
            libs/tenant/src \
            libs/email/src \
            libs/realtime/src \
            libs/workflow/src \
            libs/search/src \
            libs/external/src \
            libs/payments/src \
            libs/scaffolder/src \
            libs/calendar/src \
            libs/reports/src \
            libs/geo/src \
            libs/ai/src \
            libs/ui-style/src

  # =============================================================================
  # Build shared UI assets
  # =============================================================================
  build-ui-assets:
    name: Build UI Assets
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build admin CSS bundle
        run: npm run build:css:admin

      - name: Verify generated UI assets
        run: |
          test -f libs/ui-style/resources/public/css/daisy-admin.css
          test -f libs/ui-style/resources/public/js/theme.js
          test -f libs/ui-style/resources/public/js/htmx.min.js

  # =============================================================================
  # Documentation drift check (failing gate)
  # =============================================================================
  docs-lint:
    name: Docs Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@13.5.2
        with:
          cli: 1.11.1.1347

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-clojure-${{ hashFiles('**/deps.edn') }}
          restore-keys: ${{ runner.os }}-clojure-

      - name: Run docs-lint
        run: clojure -M:docs-lint

      - name: Upload docs-lint report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: docs-lint-report
          path: build/docs-lint/
          retention-days: 14

  # =============================================================================
  # AGENTS link integrity check
  # =============================================================================
  agents-links:
    name: AGENTS Links
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Babashka
        uses: DeLaGuardo/setup-clojure@13.5.2
        with:
          bb: latest

      - name: Check AGENTS links
        run: bb check-links

  # =============================================================================
  # Fast command smoke checks (aliases + key docs/dev commands)
  # =============================================================================
  command-smoke:
    name: Command Smoke Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@13.5.2
        with:
          cli: 1.11.1.1347

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-clojure-${{ hashFiles('**/deps.edn') }}
          restore-keys: ${{ runner.os }}-clojure-

      - name: Setup Babashka
        uses: DeLaGuardo/setup-clojure@13.5.2
        with:
          bb: latest

      - name: Run command smoke check
        run: bb smoke-check

  # =============================================================================
  # Config Doctor — validate config files for common mistakes
  # =============================================================================
  config-doctor:
    name: Config Doctor
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Babashka
        uses: DeLaGuardo/setup-clojure@13.5.2
        with:
          bb: latest

      - name: Validate dev config
        run: bb doctor --env dev --ci

      - name: Validate test config
        run: bb doctor --env test --ci

  # =============================================================================
  # FC/IS boundary enforcement (Babashka — fast, no JVM)
  # =============================================================================
  check-fcis:
    name: FC/IS Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Babashka
        uses: DeLaGuardo/setup-clojure@13.5.2
        with:
          bb: latest

      - name: Check FC/IS boundaries
        run: bb check:fcis

  # =============================================================================
  # Placeholder test detection (Babashka — fast, no JVM)
  # =============================================================================
  check-placeholder-tests:
    name: Placeholder Test Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

