name: Publish to Clojars

# Releases are driven by an unprefixed semver tag (e.g. 1.0.1-alpha-29), matching
# the bb release flow and scripts/install.sh's /releases/latest lookup. Pushing
# such a tag builds every library from the *tagged commit* and deploys to Clojars,
# guarded so the tag can never disagree with the source version, and verified so a
# partial deploy fails loudly instead of silently shipping a half/stale release.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.1-alpha-29). Defaults to libs/core/build.clj.'
        required: false
        type: string

  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'

# The Create GitHub Release step needs write access to releases; the default
# GITHUB_TOKEN is read-only, which 403s ("Resource not accessible by integration").
permissions:
  contents: write

jobs:
  publish:
    name: Publish Libraries to Clojars
    # Only the repo owner may publish: blocks any future collaborator (or a
    # compromised account with write access) from triggering a Clojars deploy
    # via tag push or manual dispatch.
    if: github.actor == 'thijs-creemers'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@13.5.2
        with:
          cli: 1.11.1.1347
          bb: latest

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-clojure-publish-${{ hashFiles('**/deps.edn') }}
          restore-keys: ${{ runner.os }}-clojure-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build shared UI CSS bundle
        run: npm run build:css:admin

      # Resolve the release version: explicit dispatch input, else the pushed tag,
      # else the source-of-truth in libs/core/build.clj.
      - name: Determine version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "$INPUT_VERSION" ]; then
            version="$INPUT_VERSION"
          elif [ "${{ startsWith(github.ref, 'refs/tags/') }}" = "true" ]; then
            version="${GITHUB_REF#refs/tags/}"
          else
            version="$(grep -m1 'def version' libs/core/build.clj | sed -E 's/.*"([^"]+)".*/\1/')"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved release version: $version"

      # Guard: every lib's build.clj must equal the release version. Prevents the
      # 'version ahead of source' failure that froze a stale jar under an immutable
      # Clojars coordinate. Aborts before any deploy on mismatch.
      - name: Guard — source version matches the release
        run: bb deploy --check-versions "${{ steps.version.outputs.version }}"

      - name: Publish all libraries
        env:
          CLOJARS_USERNAME: ${{ secrets.CLOJARS_USERNAME }}
          CLOJARS_PASSWORD: ${{ secrets.CLOJARS_PASSWORD }}
        run: bb deploy --all

      # Confirm every artifact actually landed on Clojars at this version; a
      # partial/failed deploy fails the workflow here.
      - name: Verify published artifacts
        run: bb deploy --verify

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.version.outputs.version }}
          body: |
            ## Boundary Framework ${{ steps.version.outputs.version }}

            All libraries published to Clojars.

            ```clojure
            org.boundary-app/boundary-platform {:mvn/version "${{ steps.version.outputs.version }}"}
            ```

            See [CHANGELOG.md](https://github.com/thijs-creemers/boundary/blob/main/CHANGELOG.md) for details.
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') }}

      - name: Summary
        run: |
          echo "## ✅ Publish Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "Version **${{ steps.version.outputs.version }}** — all libraries published to Clojars and verified." >> "$GITHUB_STEP_SUMMARY"
