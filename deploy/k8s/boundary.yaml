# Example Kubernetes manifests for a Boundary application.
#
# Demonstrates the web/worker split: one image, two Deployments — the `server`
# Deployment serves HTTP behind a Service; the `worker` Deployment runs the same
# image with the `worker` arg (no HTTP listener). Replace `REGISTRY/boundary:TAG`
# and the Secret/env values for your environment.
#
#   kubectl apply -f deploy/k8s/boundary.yaml
---
apiVersion: v1
kind: Secret
metadata:
  name: boundary-secrets
type: Opaque
stringData:
  # Replace with real values (or source from your secret manager / sealed-secrets).
  JWT_SECRET: "change-me-min-32-chars-................"
  DB_PASSWORD: "change-me"
  REDIS_PASSWORD: "change-me"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: boundary-config
data:
  BND_ENV: "prod"
  HTTP_PORT: "3000"
  # Rate limiting in :prod requires an active Redis cache (the app refuses to
  # boot with rate limiting enabled and no cache — see BOU-173). Point these at
  # your Redis and enable it once it is reachable.
  REDIS_HOST: "boundary-redis"
  REDIS_PORT: "6379"
  HTTP_RATE_LIMIT_ENABLED: "false"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: boundary-server
  labels: { app: boundary, role: server }
spec:
  replicas: 2
  selector:
    matchLabels: { app: boundary, role: server }
  template:
    metadata:
      labels: { app: boundary, role: server }
    spec:
      containers:
        - name: boundary
          image: REGISTRY/boundary:TAG
          args: ["server"]
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef: { name: boundary-config }
            - secretRef: { name: boundary-secrets }
          # Kubernetes-native probes (the app already serves these endpoints).
          livenessProbe:
            httpGet: { path: /health/live, port: 3000 }
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /health/ready, port: 3000 }
            initialDelaySeconds: 15
            periodSeconds: 10
          # Give the pod time to drain in-flight requests (matches the app's
          # graceful Jetty shutdown / HTTP_DRAIN_TIMEOUT_MS).
          lifecycle:
            preStop:
              exec: { command: ["sleep", "10"] }
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { memory: "768Mi" }
      terminationGracePeriodSeconds: 45
---
apiVersion: v1
kind: Service
metadata:
  name: boundary
spec:
  selector: { app: boundary, role: server }
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: boundary-worker
  labels: { app: boundary, role: worker }
spec:
  replicas: 1
  selector:
    matchLabels: { app: boundary, role: worker }
  template:
    metadata:
      labels: { app: boundary, role: worker }
    spec:
      containers:
        - name: boundary
          image: REGISTRY/boundary:TAG
          # Same image, worker mode — no HTTP listener, so no HTTP probes.
          args: ["worker"]
          envFrom:
            - configMapRef: { name: boundary-config }
            - secretRef: { name: boundary-secrets }
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { memory: "768Mi" }
      terminationGracePeriodSeconds: 45
