# /etc/nginx/sites-available/boundary
# Reverse proxy for Boundary application
#
# Enable: ln -s /etc/nginx/sites-available/boundary /etc/nginx/sites-enabled/
# Test:   nginx -t && systemctl reload nginx

upstream boundary_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com;

    # TLS — replace with your cert paths (or use Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Logging
    access_log /var/log/nginx/boundary-access.log;
    error_log  /var/log/nginx/boundary-error.log;

    # Request limits
    client_max_body_size 10m;

    # Proxy to Boundary app
    location / {
        proxy_pass http://boundary_app;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # WebSocket support (realtime module)
    location /ws {
        proxy_pass http://boundary_app;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Health check (no access log noise)
    location /health {
        proxy_pass http://boundary_app;
        access_log off;
    }

    # Static assets — long cache
    location ~* \.(css|js|ico|png|jpg|jpeg|gif|svg|woff2?)$ {
        proxy_pass http://boundary_app;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
